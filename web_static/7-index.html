<!DOCTYPE html>
<html>
<head>
    <title>AirBnB clone</title>
    <link rel="stylesheet" href="styles/4-common.css">
    <link rel="stylesheet" href="styles/3-header.css">
    <link rel="stylesheet" href="styles/3-footer.css">
    <link rel="stylesheet" href="styles/6-filters.css">
    <link rel="stylesheet" href="styles/7-places.css">
</head>
<body>
    
    <!--Container for the header logo-->
    <header>
        <div class="logo"></div>
    </header>
    
    <!--Container that holds filters and search button-->
    <div class="container">
        
        <!-- Filters section -->
        <section class="filters">
            <!-- Locations -->
            <div class="locations">
                <h3>States</h3>
                <ul class="popover">
                    <li>
                        <h2>Lagos</h2>
                        <ul>
                            <li>Ikeja</li>
                            <li>Ikoyi</li>
                            <li>Lekki</li>
                        </ul>
                    </li>
                    <li>
                        <h2>Abuja</h2>
                        <ul>
                            <li>Garki</li>
                            <li>Wuse</li>
                            <li>Maitama</li>
                        </ul>
                    </li>
                </ul>
            </div>
            
            <!-- Amenities -->
            <div class="amenities">
                <h3>Amenities</h3>
                <ul class="popover">
                    <li>power</li>
                    <li>Hospital</li>
                    <li>Road</li>
                </ul>
            </div>
            
            <!-- Button -->
            <button class="search-button">Search</button>
        </section>
        
        <!-- Places section -->
        <section class="places">
			<div class="places_title">
                <h1>Places</h1>
            </div>

            <div class="articles">
                <article>
                    <h2>My Home</h2>
                </article>
                    
				<article>
                    <h2>Tiny House</h2>
                </article>

                <article>
                    <h2>A suite</h2>
                </article>
            </div>

        </section>
    
    </div>
    
    <!-- Footer -->
    <footer>
        <p>Best School</p>
    </footer>
</body>
</html>
