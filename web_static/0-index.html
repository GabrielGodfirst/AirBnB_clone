<!--code that displays only the header and footer-->

<!DOCTYPE html>
<html>
<head>
    <title>Inline styling</title>
</head>
<body style="margin: 0; padding: 0;">
    <header style="background-color: #FF0000; height: 70px; width: 100%; text-align: center;">
        
    </header>
    
    <footer style="background-color: #00FF00; height: 60px; width: 100%; position: fixed; bottom: 0; text-align: center;">
        <p style="margin: 0; padding: 0; line-height: 60px; color: white;">Best School</p>
    </footer>
</body>
</html>
