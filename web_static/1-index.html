<!--file with styling in the head-->

<!DOCTYPE html>
<html>
<head>
    <title>Head styling</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #FF0000;
            height: 70px;
            width: 100%;
            text-align: center;
        }
        header h1 {
            margin: 0;
            padding: 0;
            line-height: 70px;
            color: white;
        }
        footer {
            background-color: #00FF00;
            height: 60px;
            width: 100%;
            position: fixed;
            bottom: 0;
            text-align: center;
        }
        footer p {
            margin: 0;
            padding: 0;
            line-height: 60px;
            color: white;
        }
    </style>
</head>
<body>
    <header>
     
    </header>
    
    <footer>
        <p>Best School</p>
    </footer>
</body>
</html>
